<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      width: 100%; height: 100%;
      font-family: -apple-system, 'Segoe UI', sans-serif;
    }

    #summon {
      position: fixed; inset: 0;
      background: rgba(12, 12, 24, 0.96);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      display: flex; flex-direction: column;
      overflow: hidden;
      box-shadow: 0 24px 64px rgba(0,0,0,0.7);
      backdrop-filter: blur(20px);
    }

    #search-row {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    #search-icon { font-size: 18px; opacity: 0.5; flex-shrink: 0; }
    #search-input {
      flex: 1; background: transparent; border: none; outline: none;
      font-size: 16px; color: #eaeaea;
      caret-color: #9b7fd4;
    }
    #search-input::placeholder { color: rgba(255,255,255,0.25); }
    #search-esc {
      font-size: 10px; color: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 4px; padding: 2px 5px;
      flex-shrink: 0;
    }

    #results {
      flex: 1; overflow-y: auto; padding: 6px 0;
    }

    .result-section { padding: 4px 16px 2px; font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; }

    .result-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 16px; cursor: pointer;
      transition: background 0.1s;
    }
    .result-item:hover, .result-item.selected { background: rgba(124,92,191,0.2); }
    .result-item.selected .ri-label { color: #fff; }
    .ri-icon { font-size: 15px; flex-shrink: 0; width: 22px; text-align: center; }
    .ri-label { font-size: 13px; color: #d4d4e8; flex: 1; }
    .ri-sub   { font-size: 10px; color: rgba(255,255,255,0.35); }
    .ri-type  { font-size: 10px; color: rgba(255,255,255,0.25);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 3px; padding: 1px 4px; }

    #status-row {
      padding: 6px 16px; border-top: 1px solid rgba(255,255,255,0.06);
      display: flex; gap: 12px; flex-shrink: 0;
    }
    .key-hint { font-size: 10px; color: rgba(255,255,255,0.25); }
    .key-hint kbd {
      background: rgba(255,255,255,0.08); border-radius: 3px;
      padding: 1px 4px; font-family: inherit; font-size: 10px; margin-right: 3px;
    }

    #empty-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px; color: rgba(255,255,255,0.2); font-size: 12px; gap: 8px;
    }
    #empty-state .es-icon { font-size: 32px; opacity: 0.3; }

    /* Scrollbar */
    #results::-webkit-scrollbar { width: 4px; }
    #results::-webkit-scrollbar-track { background: transparent; }
    #results::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>
  <div id="summon">
    <div id="search-row">
      <span id="search-icon">🔍</span>
      <input id="search-input" type="text" placeholder="Search characters, docs, lore... or type / for commands" autocomplete="off" spellcheck="false">
      <span id="search-esc">Esc</span>
    </div>
    <div id="results">
      <div id="empty-state">
        <div class="es-icon">✦</div>
        <div>Start typing to search your project</div>
        <div style="font-size:10px;opacity:0.6">/ for commands  ·  ↑↓ navigate  ·  Enter select</div>
      </div>
    </div>
    <div id="status-row">
      <span class="key-hint"><kbd>↑↓</kbd>Navigate</span>
      <span class="key-hint"><kbd>Enter</kbd>Select</span>
      <span class="key-hint"><kbd>Esc</kbd>Close</span>
      <span class="key-hint"><kbd>/</kbd>Commands</span>
    </div>
  </div>

  <script>
    const api = window.overlayApi;
    let _data    = {};
    let _results = [];
    let _sel     = 0;

    const input   = document.getElementById('search-input');
    const results = document.getElementById('results');

    const COMMANDS = [
      { icon: '✅', label: '/todo — Add a todo',        sub: 'Create a new todo item',          cmd: 'todo' },
      { icon: '📋', label: '/note — Quick note',         sub: 'Capture a thought to writing hub', cmd: 'note' },
      { icon: '⚡', label: '/sprint — Start writing sprint', sub: 'Start a timed writing session', cmd: 'sprint' },
      { icon: '⏱', label: '/time — Session timer',      sub: 'View session statistics',          cmd: 'time' },
      { icon: '📝', label: '/words — Word count',        sub: 'Show word count breakdown',        cmd: 'words' },
      { icon: '📂', label: '/open — Open ArcVeil',       sub: 'Bring main window to front',       cmd: 'open' },
    ];

    const TYPE_ICON = {
      character: '👤', location: '📍', faction: '⚔', document: '📄',
      lore: '📚', todo: '✅', stats: '⏱', map: '🗺',
    };

    if (api) {
      api.onData(d => { _data = d || {}; _search(input.value); });
      api.onShow(() => { input.value = ''; _renderEmpty(); input.focus(); });
    }

    input.addEventListener('input', () => _search(input.value));
    input.addEventListener('keydown', e => {
      if (e.key === 'Escape') { api?.hide?.(); return; }
      if (e.key === 'ArrowDown')  { e.preventDefault(); _move(1); }
      if (e.key === 'ArrowUp')    { e.preventDefault(); _move(-1); }
      if (e.key === 'Enter')       { e.preventDefault(); _select(); }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') api?.hide?.();
    });

    function _search(q) {
      const trimmed = q.trim();
      if (!trimmed) { _renderEmpty(); return; }

      if (trimmed.startsWith('/')) {
        _results = COMMANDS.filter(c => c.label.toLowerCase().includes(trimmed.toLowerCase()) || trimmed === '/');
        _renderCommandResults();
        return;
      }

      const lower = trimmed.toLowerCase();
      _results = [];

      _addResults('character', (_data.characters || [])
        .filter(c => (c.name||c.label||'').toLowerCase().includes(lower))
        .slice(0, 4)
        .map(c => ({ icon: '👤', label: c.name||c.label||'', sub: c.role||'Character', type: 'character', id: c.id }))
      );
      _addResults('document', (_data.documents || [])
        .filter(d => (d.title||'').toLowerCase().includes(lower))
        .slice(0, 3)
        .map(d => ({ icon: '📄', label: d.title||'Untitled', sub: (d.wordCount||0)+' words', type: 'document', id: d.id }))
      );
      _addResults('location', (_data.locations || [])
        .filter(l => (l.name||'').toLowerCase().includes(lower))
        .slice(0, 3)
        .map(l => ({ icon: '📍', label: l.name||'', sub: l.type||'Location', type: 'location', id: l.id }))
      );
      _addResults('lore', (_data.lore || [])
        .filter(l => (l.title||'').toLowerCase().includes(lower))
        .slice(0, 3)
        .map(l => ({ icon: '📚', label: l.title||'', sub: l.category||'Lore', type: 'lore', id: l.id }))
      );
      _addResults('todo', (_data.todos || [])
        .filter(t => !t.completed && (t.text||'').toLowerCase().includes(lower))
        .slice(0, 3)
        .map(t => ({ icon: '✅', label: t.text||'', sub: 'Todo', type: 'todo', id: t.id }))
      );

      if (!_results.length) {
        results.innerHTML = `<div class="empty-state" style="padding:20px;text-align:center;color:rgba(255,255,255,0.25);font-size:12px">No results for "${_esc(trimmed)}"</div>`;
        return;
      }
      _sel = 0;
      _renderResults();
    }

    function _addResults(type, items) {
      if (items.length) _results.push(...items.map(i => ({ ...i, _type: type })));
    }

    function _renderEmpty() {
      _results = [];
      results.innerHTML = `<div id="empty-state"><div class="es-icon">✦</div><div>Start typing to search your project</div><div style="font-size:10px;opacity:0.6">/ for commands  ·  ↑↓ navigate  ·  Enter select</div></div>`;
    }

    function _renderResults() {
      results.innerHTML = _results.map((r, i) => `
        <div class="result-item${i === _sel ? ' selected' : ''}" data-idx="${i}">
          <span class="ri-icon">${r.icon}</span>
          <span class="ri-label">${_esc(r.label)}</span>
          <span class="ri-sub">${_esc(r.sub||'')}</span>
          <span class="ri-type">${r.type||r._type||''}</span>
        </div>
      `).join('');
      results.querySelectorAll('.result-item').forEach(el => {
        el.addEventListener('click', () => { _sel = +el.dataset.idx; _select(); });
        el.addEventListener('mouseenter', () => { _sel = +el.dataset.idx; _highlight(); });
      });
    }

    function _renderCommandResults() {
      results.innerHTML = _results.map((r, i) => `
        <div class="result-item${i === _sel ? ' selected' : ''}" data-idx="${i}" data-cmd="${r.cmd}">
          <span class="ri-icon">${r.icon}</span>
          <span class="ri-label">${_esc(r.label)}</span>
          <span class="ri-sub">${_esc(r.sub||'')}</span>
        </div>
      `).join('');
      results.querySelectorAll('.result-item').forEach(el => {
        el.addEventListener('click', () => { _sel = +el.dataset.idx; _select(); });
        el.addEventListener('mouseenter', () => { _sel = +el.dataset.idx; _highlight(); });
      });
    }

    function _move(dir) {
      if (!_results.length) return;
      _sel = (_sel + dir + _results.length) % _results.length;
      _highlight();
    }

    function _highlight() {
      results.querySelectorAll('.result-item').forEach((el, i) => el.classList.toggle('selected', i === _sel));
    }

    function _select() {
      const r = _results[_sel];
      if (!r) return;
      api?.select?.({ ...r });
      api?.hide?.();
    }

    function _esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    // Auto-focus
    setTimeout(() => input.focus(), 50);
  </script>
</body>
</html>
