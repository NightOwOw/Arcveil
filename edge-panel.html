<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent;
      overflow: hidden;
      width: 100%; height: 100%;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      -webkit-user-select: none; user-select: none;
    }

    #panel {
      position: fixed; inset: 0;
      background: rgba(12, 12, 24, 0.95);
      border-left: 1px solid rgba(255,255,255,0.1);
      color: #eaeaea;
      display: flex; flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(12px);
      transform: translateX(100%);
      transition: transform 0.22s cubic-bezier(0.4,0,0.2,1);
    }
    #panel.expanded { transform: translateX(0); }

    /* Collapsed strip */
    #strip {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 8px;
      background: linear-gradient(180deg, #7c5cbf 0%, #3b7bbf 100%);
      cursor: pointer;
      transition: width 0.15s;
      border-radius: 4px 0 0 4px;
    }
    #strip:hover { width: 12px; }
    #panel.expanded + #strip, #panel.pinned + #strip { display: none; }

    /* Header */
    #ep-header {
      padding: 12px 14px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    #ep-title { flex: 1; font-size: 13px; font-weight: 700; color: #fff; }
    .ep-icon-btn {
      background: transparent; border: none; cursor: pointer;
      font-size: 14px; color: rgba(255,255,255,0.4); padding: 3px;
      border-radius: 4px; transition: color 0.15s;
    }
    .ep-icon-btn:hover { color: #fff; }
    .ep-icon-btn.active { color: #9b7fd4; }

    /* Sections */
    #ep-body { flex: 1; overflow-y: auto; padding: 8px 0; }

    .ep-section { margin-bottom: 4px; }
    .ep-section-head {
      font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.3);
      text-transform: uppercase; letter-spacing: 0.5px;
      padding: 6px 14px 3px;
    }

    .ep-stat-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 14px;
    }
    .ep-stat-icon { font-size: 12px; opacity: 0.7; }
    .ep-stat-val  { font-size: 13px; font-weight: 700; }
    .ep-stat-label{ font-size: 10px; color: rgba(255,255,255,0.4); }

    .ep-goal-bar { height: 4px; background: rgba(255,255,255,0.08); margin: 2px 14px 6px; border-radius: 2px; overflow: hidden; }
    .ep-goal-fill { height: 100%; background: #7c5cbf; border-radius: 2px; transition: width 0.5s; }

    .ep-char-row {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 14px; cursor: pointer; border-radius: 4px; margin: 0 6px;
    }
    .ep-char-row:hover { background: rgba(255,255,255,0.06); }
    .ep-char-avatar { font-size: 16px; }
    .ep-char-name { font-size: 12px; }

    .ep-todo-item {
      display: flex; align-items: flex-start; gap: 8px;
      padding: 5px 14px; font-size: 11px; color: rgba(255,255,255,0.7);
      cursor: pointer; border-radius: 4px; margin: 0 6px;
    }
    .ep-todo-item:hover { background: rgba(255,255,255,0.06); }
    .ep-todo-dot { width: 6px; height: 6px; border-radius: 50%; background: #9b7fd4; flex-shrink: 0; margin-top: 4px; }

    #ep-search {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 6px; padding: 5px 8px; font-size: 12px; color: #eaeaea;
      width: calc(100% - 28px); margin: 4px 14px;
      outline: none;
    }
    #ep-search::placeholder { color: rgba(255,255,255,0.25); }

    .ep-companion-msg {
      margin: 6px 14px; padding: 8px 10px;
      background: rgba(124,92,191,0.15); border: 1px solid rgba(124,92,191,0.2);
      border-radius: 8px; font-size: 11px; color: rgba(255,255,255,0.7);
      font-style: italic; line-height: 1.5;
    }
    .ep-companion-name { font-size: 10px; font-weight: 700; color: #9b7fd4; margin-bottom: 3px; }

    #ep-body::-webkit-scrollbar { width: 3px; }
    #ep-body::-webkit-scrollbar-track { background: transparent; }
    #ep-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); }
  </style>
</head>
<body>
  <div id="panel">
    <div id="ep-header">
      <span id="ep-title">✦ ArcVeil</span>
      <button class="ep-icon-btn" id="ep-pin" title="Pin panel">📌</button>
      <button class="ep-icon-btn" id="ep-close" title="Close">×</button>
    </div>
    <div id="ep-body">

      <div class="ep-section">
        <div class="ep-section-head">Today</div>
        <div class="ep-stat-row">
          <span class="ep-stat-icon">📝</span>
          <span class="ep-stat-val" id="ep-words">0</span>
          <span class="ep-stat-label">/ <span id="ep-goal">1000</span> words</span>
        </div>
        <div class="ep-goal-bar"><div class="ep-goal-fill" id="ep-fill" style="width:0%"></div></div>
        <div class="ep-stat-row">
          <span class="ep-stat-icon">⏱</span>
          <span class="ep-stat-val" id="ep-time">0m</span>
          <span class="ep-stat-label">session</span>
          <div style="flex:1"></div>
          <span class="ep-stat-icon">🔥</span>
          <span class="ep-stat-val" id="ep-streak">0</span>
          <span class="ep-stat-label">streak</span>
        </div>
      </div>

      <div class="ep-section">
        <div class="ep-section-head">Characters</div>
        <input id="ep-search" type="text" placeholder="Search characters…">
        <div id="ep-chars"></div>
      </div>

      <div class="ep-section">
        <div class="ep-section-head">Active Todos</div>
        <div id="ep-todos"></div>
      </div>

      <div class="ep-section" id="ep-companion-section">
        <div class="ep-section-head">Companion</div>
        <div class="ep-companion-msg" id="ep-companion-msg">
          <div class="ep-companion-name" id="ep-companion-name">Ciona</div>
          <div id="ep-companion-text">Start writing to see Ciona's reactions~</div>
        </div>
      </div>
    </div>
  </div>
  <div id="strip" title="Open panel"></div>

  <script>
    const api = window.overlayApi;
    const panel = document.getElementById('panel');
    const strip = document.getElementById('strip');
    let pinned = false;
    let collapseTimer = null;
    let allChars = [];

    function expand() {
      panel.classList.add('expanded');
      clearTimeout(collapseTimer);
    }
    function collapse() {
      if (pinned) return;
      panel.classList.remove('expanded');
    }

    strip.addEventListener('click', expand);
    strip.addEventListener('mouseenter', expand);
    panel.addEventListener('mouseleave', () => {
      if (pinned) return;
      collapseTimer = setTimeout(collapse, 500);
    });
    panel.addEventListener('mouseenter', () => clearTimeout(collapseTimer));

    document.getElementById('ep-pin').addEventListener('click', () => {
      pinned = !pinned;
      document.getElementById('ep-pin').classList.toggle('active', pinned);
      panel.classList.toggle('pinned', pinned);
    });
    document.getElementById('ep-close').addEventListener('click', () => api?.close?.());

    // Character search
    document.getElementById('ep-search').addEventListener('input', e => {
      _renderChars(e.target.value);
    });

    function _renderChars(q) {
      const filtered = q ? allChars.filter(c => (c.name||c.label||'').toLowerCase().includes(q.toLowerCase())) : allChars.slice(0, 6);
      document.getElementById('ep-chars').innerHTML = filtered.length
        ? filtered.map(c => `<div class="ep-char-row" data-id="${c.id}"><span class="ep-char-avatar">${c.emoji||'👤'}</span><span class="ep-char-name">${_esc(c.name||c.label||'')}</span></div>`).join('')
        : '<div style="padding:5px 14px;font-size:11px;color:rgba(255,255,255,0.3)">No characters</div>';
      document.querySelectorAll('.ep-char-row').forEach(el => {
        el.addEventListener('click', () => api?.select?.({ type:'character', id: el.dataset.id }));
      });
    }

    if (api) {
      api.onData(d => {
        if (!d) return;
        document.getElementById('ep-words').textContent  = d.wordCountToday  || 0;
        document.getElementById('ep-goal').textContent   = d.dailyGoal        || 1000;
        document.getElementById('ep-streak').textContent = d.streak            || 0;
        const pct = Math.min(100, ((d.wordCountToday||0)/(d.dailyGoal||1000))*100);
        document.getElementById('ep-fill').style.width   = pct + '%';
        const m = Math.floor((d.sessionMs||0)/60000);
        document.getElementById('ep-time').textContent   = m < 60 ? m+'m' : Math.floor(m/60)+'h '+(m%60)+'m';

        allChars = d.recentCharacters || [];
        _renderChars('');

        const todos = (d.activeTodos||[]).slice(0,5);
        document.getElementById('ep-todos').innerHTML = todos.length
          ? todos.map(t => `<div class="ep-todo-item"><div class="ep-todo-dot"></div>${_esc(t.text||'')}</div>`).join('')
          : '<div style="padding:5px 14px;font-size:11px;color:rgba(255,255,255,0.3)">All done!</div>';

        if (d.companionMessage) document.getElementById('ep-companion-text').textContent = d.companionMessage;
        if (d.companionName)    document.getElementById('ep-companion-name').textContent = d.companionName;
        if (d.projectName)      document.getElementById('ep-title').textContent = '✦ ' + d.projectName;
      });

      api.onShow(() => expand());
      api.onHide(() => collapse());
    }

    function _esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  </script>
</body>
</html>
